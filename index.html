<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frisco E.M.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg: #070c14;
  --surface: rgba(8,15,26,0.93);
  --surface2: rgba(10,20,36,0.97);
  --border: rgba(0,170,240,0.18);
  --border-hi: rgba(0,200,255,0.45);
  --accent: #00c8ff;
  --warn: #ff6b00;
  --danger: #ff1744;
  --safe: #00e676;
  --watch: #ffea00;
  --text: #b8d4e8;
  --text-dim: rgba(160,200,225,0.45);
  --text-hi: #e4f2ff;
  --glow: 0 0 18px rgba(0,200,255,0.25);
  --glow-danger: 0 0 22px rgba(255,23,68,0.55);
  --fd: 'Rajdhani', sans-serif;
  --fm: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;font-family:var(--fd);background:var(--bg);color:var(--text)}

/* MAP */
#map{position:absolute;inset:0;z-index:1}

/* TOPBAR */
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:1000;
  height:48px;
  background:linear-gradient(180deg,rgba(5,10,18,.98) 0%,rgba(5,10,18,.75) 100%);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:16px;
  backdrop-filter:blur(14px);
}
.logo{
  font-family:var(--fd);font-size:17px;font-weight:700;
  letter-spacing:3px;color:var(--accent);
  text-shadow:0 0 16px rgba(0,200,255,.4);
  white-space:nowrap;flex-shrink:0;
}
.tb-div{width:1px;height:26px;background:var(--border);flex-shrink:0}
.layer-btns{display:flex;gap:5px;flex-wrap:wrap}

.lbtn{
  font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:.8px;
  padding:4px 11px;border-radius:3px;
  border:1px solid var(--border);background:rgba(0,170,240,.04);
  color:var(--text-dim);cursor:pointer;transition:all .15s;
  text-transform:uppercase;white-space:nowrap;
}
.lbtn:hover{border-color:var(--border-hi);color:var(--text)}
.lbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,200,255,.1);box-shadow:0 0 8px rgba(0,200,255,.18)}
.lbtn.on.warn{border-color:var(--warn);color:var(--warn);background:rgba(255,107,0,.1);box-shadow:0 0 8px rgba(255,107,0,.18)}
.lbtn.on.danger{border-color:var(--danger);color:var(--danger);background:rgba(255,23,68,.1)}
.lbtn.on.lite{border-color:var(--watch);color:var(--watch);background:rgba(255,234,0,.08)}

#clock{margin-left:auto;font-family:var(--fm);font-size:12px;color:var(--text-dim);white-space:nowrap;flex-shrink:0}

/* HUD CARDS */
.hud{
  position:absolute;z-index:900;
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;backdrop-filter:blur(18px);
  min-width:220px;max-width:310px;
  transition:border-color .2s,box-shadow .2s;
}
.hud:hover{border-color:var(--border-hi);box-shadow:var(--glow)}
.hud.alert-active{border-color:var(--danger);box-shadow:var(--glow-danger);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(255,23,68,.3)}50%{box-shadow:0 0 28px rgba(255,23,68,.7)}}

.hud-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 11px;border-bottom:1px solid var(--border);
  background:rgba(0,170,240,.03);cursor:move;user-select:none;
}
.hud-title{
  font-family:var(--fm);font-size:9.5px;letter-spacing:2px;
  text-transform:uppercase;color:var(--accent);
  display:flex;align-items:center;gap:6px;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.6s infinite;flex-shrink:0}
.dot.g{background:var(--safe)}
.dot.r{background:var(--danger);animation:blink .8s infinite}
.dot.y{background:var(--watch)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.hud-tog{font-family:var(--fm);font-size:11px;color:var(--text-dim);cursor:pointer;padding:2px 5px;border-radius:2px;transition:all .15s}
.hud-tog:hover{color:var(--accent);background:rgba(0,200,255,.1)}
.hud-body{padding:10px 11px}
.hud.collapsed .hud-body{display:none}

/* CONDITIONS */
#hud-cond{top:62px;left:12px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ci label{display:block;font-family:var(--fm);font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:2px}
.ci .val{font-family:var(--fd);font-size:22px;font-weight:600;color:var(--text-hi);line-height:1}
.ci .val sup{font-size:12px;color:var(--text-dim);font-weight:400}
.cond-desc{font-family:var(--fm);font-size:9.5px;color:var(--text-dim);margin-top:7px;letter-spacing:.5px}

/* ALERTS */
#hud-alerts{top:62px;right:12px;min-width:260px;max-width:310px}
.al-item{border-left:3px solid var(--border);padding:6px 8px;border-radius:0 3px 3px 0;background:rgba(0,0,0,.2);margin-bottom:5px}
.al-item:last-child{margin-bottom:0}
.al-item.W{border-color:var(--danger);background:rgba(255,23,68,.07)}
.al-item.A{border-color:var(--watch);background:rgba(255,234,0,.05)}
.al-item.Y{border-color:var(--warn);background:rgba(255,107,0,.07)}
.al-event{font-family:var(--fm);font-size:9.5px;letter-spacing:.5px;font-weight:500;text-transform:uppercase}
.al-item.W .al-event{color:var(--danger)}
.al-item.A .al-event{color:var(--watch)}
.al-item.Y .al-event{color:var(--warn)}
.al-head{font-size:11.5px;color:var(--text-dim);margin-top:2px;line-height:1.3}
.al-exp{font-family:var(--fm);font-size:8.5px;color:var(--text-dim);margin-top:3px}
.no-alerts{font-family:var(--fm);font-size:10.5px;color:var(--safe);display:flex;align-items:center;gap:6px}

/* RADAR */
#hud-radar{bottom:20px;left:12px;min-width:255px}
.rsect-label{font-family:var(--fm);font-size:8.5px;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase}
.rsrc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:6px}
.rsrc-grid.two{grid-template-columns:1fr 1fr}
.rsrc-btn{
  font-family:var(--fm);font-size:8.5px;letter-spacing:.5px;
  padding:5px 3px;border-radius:3px;border:1px solid var(--border);
  background:rgba(0,170,240,.03);color:var(--text-dim);
  cursor:pointer;text-align:center;transition:all .15s;text-transform:uppercase;
  line-height:1.3;
}
.rsrc-btn:hover{border-color:var(--border-hi);color:var(--text)}
.rsrc-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,200,255,.09)}
.rsrc-btn.dim{opacity:.45;cursor:default}
.rsrc-btn small{display:block;font-size:7.5px;color:var(--text-dim)}
.rtype-row{display:flex;gap:4px;margin-bottom:8px}
.rtype-btn{
  flex:1;font-family:var(--fm);font-size:9px;letter-spacing:1px;
  padding:5px;border-radius:3px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;
  text-align:center;transition:all .15s;text-transform:uppercase;
}
.rtype-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,200,255,.09)}
.timeline-row{display:flex;align-items:center;gap:8px}
.tbar{flex:1;height:3px;background:rgba(0,170,240,.15);border-radius:2px;overflow:hidden;cursor:pointer}
.tfill{height:100%;background:linear-gradient(90deg,rgba(0,200,255,.35),var(--accent));border-radius:2px;transition:width .25s}
.tlabel{font-family:var(--fm);font-size:9px;color:var(--text-dim);white-space:nowrap}
.play-btn{
  font-family:var(--fm);font-size:9.5px;padding:3px 8px;
  border:1px solid var(--border);border-radius:2px;
  background:rgba(0,170,240,.05);color:var(--accent);cursor:pointer;transition:all .15s;
}
.play-btn:hover{background:rgba(0,200,255,.14);border-color:var(--border-hi)}
.radar-status{font-family:var(--fm);font-size:8.5px;color:var(--text-dim);margin-top:6px;display:flex;justify-content:space-between}

/* CAMERAS */
#hud-cam{bottom:20px;right:12px;min-width:270px;max-width:300px}
.cam-item{
  display:flex;align-items:center;gap:8px;padding:6px 7px;
  border:1px solid var(--border);border-radius:3px;background:rgba(0,0,0,.2);
  cursor:pointer;transition:all .15s;margin-bottom:5px;
}
.cam-item:last-child{margin-bottom:0}
.cam-item:hover{border-color:var(--border-hi);background:rgba(0,170,240,.06)}
.cam-name{font-family:var(--fm);font-size:9.5px;color:var(--text);flex:1}
.cam-dist{font-family:var(--fm);font-size:8px;color:var(--text-dim)}
.cam-thumb{width:46px;height:30px;object-fit:cover;border-radius:2px;border:1px solid var(--border);background:rgba(0,0,0,.4)}

/* CAMERA MODAL */
#cam-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center}
#cam-modal.open{display:flex}
.cam-modal-inner{background:var(--surface2);border:1px solid var(--border-hi);border-radius:5px;padding:16px;max-width:620px;width:90%;box-shadow:var(--glow)}
.cam-mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cam-mtitle{font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.cam-mclose{font-family:var(--fm);font-size:11px;color:var(--text-dim);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:3px;transition:all .15s}
.cam-mclose:hover{color:var(--danger);border-color:var(--danger)}
#cam-modal img{width:100%;border-radius:3px;border:1px solid var(--border);background:#000;display:block}
.cam-mlink{display:block;margin-top:8px;font-family:var(--fm);font-size:9.5px;color:var(--accent);text-decoration:none;letter-spacing:.5px}
.cam-mlink:hover{text-decoration:underline}

/* SIREN MARKER */
.siren-dot{width:9px;height:9px;border-radius:50%;background:rgba(0,200,255,.55);border:1.5px solid var(--accent);box-shadow:0 0 5px rgba(0,200,255,.35)}

/* LIGHTNING */
.lt-strike{width:7px;height:7px;border-radius:50%;background:var(--watch);box-shadow:0 0 5px var(--watch),0 0 2px #fff;animation:lt-fade 3.5s forwards}
@keyframes lt-fade{0%{opacity:1;transform:scale(1.6)}15%{opacity:1;transform:scale(1)}100%{opacity:0}}

/* REFRESH BAR */
#rbar{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);z-index:1100;width:0;transition:width .4s linear}

/* LEAFLET OVERRIDES */
.leaflet-tile{filter:brightness(.9) saturate(.65)}
.leaflet-control-attribution{background:rgba(5,10,18,.75)!important;color:rgba(130,160,180,.5)!important;font-size:8.5px!important}
.leaflet-control-attribution a{color:rgba(0,200,255,.4)!important}
.leaflet-popup-content-wrapper{background:var(--surface2)!important;border:1px solid var(--border-hi)!important;border-radius:4px!important;color:var(--text)!important;font-family:var(--fm)!important;font-size:11px!important;box-shadow:var(--glow)!important}
.leaflet-popup-tip{background:var(--surface2)!important}
.leaflet-popup-close-button{color:var(--text-dim)!important}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
</style>
</head>
<body>

<div id="map"></div>
<div id="rbar"></div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">FRISCO E.M.</div>
  <div class="tb-div"></div>
  <div class="layer-btns">
    <button class="lbtn on"        id="btn-refl"     >REFLECTIVITY</button>
    <button class="lbtn"           id="btn-vel"      >VELOCITY</button>
    <div class="tb-div"></div>
    <button class="lbtn on warn"   id="btn-warnings" >WARNINGS</button>
    <button class="lbtn on warn"   id="btn-watches"  >WATCHES</button>
    <button class="lbtn on lite"   id="btn-lightning">LIGHTNING</button>
    <button class="lbtn on"        id="btn-sirens"   >SIRENS</button>
    <button class="lbtn on"        id="btn-cameras"  >CAMERAS</button>
  </div>
  <div id="clock">--:--:-- CDT</div>
</div>

<!-- CONDITIONS HUD -->
<div class="hud" id="hud-cond">
  <div class="hud-head" id="hud-cond-head">
    <div class="hud-title"><div class="dot g"></div>CONDITIONS · FRISCO</div>
    <div class="hud-tog" id="hud-cond-tog">▾</div>
  </div>
  <div class="hud-body">
    <div class="cg">
      <div class="ci"><label>TEMP</label><div class="val" id="c-temp">—<sup>°F</sup></div></div>
      <div class="ci"><label>WIND</label><div class="val" id="c-wind" style="font-size:18px">—</div></div>
      <div class="ci"><label>HUMIDITY</label><div class="val" id="c-hum">—<sup>%</sup></div></div>
      <div class="ci"><label>PRESSURE</label><div class="val" id="c-pres" style="font-size:15px">—<sup>hPa</sup></div></div>
    </div>
    <div class="cond-desc" id="c-desc">Loading…</div>
    <div class="cond-desc" style="font-size:8.5px;margin-top:2px">SRC: KDFW · NWS</div>
  </div>
</div>

<!-- ALERTS HUD -->
<div class="hud" id="hud-alerts">
  <div class="hud-head" id="hud-alerts-head">
    <div class="hud-title"><div class="dot" id="alert-dot"></div>NWS ALERTS · DFW AREA</div>
    <div class="hud-tog" id="hud-alerts-tog">▾</div>
  </div>
  <div class="hud-body">
    <div id="alert-list"><div style="font-family:var(--fm);font-size:10px;color:var(--text-dim);text-align:center;padding:6px 0;letter-spacing:1px">FETCHING ALERTS…</div></div>
  </div>
</div>

<!-- RADAR HUD -->
<div class="hud" id="hud-radar">
  <div class="hud-head" id="hud-radar-head">
    <div class="hud-title"><div class="dot"></div>RADAR CONTROL</div>
    <div class="hud-tog" id="hud-radar-tog">▾</div>
  </div>
  <div class="hud-body">
    <div class="rsect-label">NWS WSR-88D</div>
    <div class="rsrc-grid">
      <button class="rsrc-btn on" id="rsrc-KFWS">KFWS<small>Ft Worth</small></button>
      <button class="rsrc-btn"    id="rsrc-KDYX">KDYX<small>Dyess AFB</small></button>
      <button class="rsrc-btn"    id="rsrc-KFDR">KFDR<small>Altus AFB</small></button>
    </div>
    <div class="rsect-label">TDWR (LIMITED DATA)</div>
    <div class="rsrc-grid two" style="margin-bottom:8px">
      <button class="rsrc-btn dim" id="rsrc-TDAL" title="TDWR not on public radar tile network">TDAL<small>Love Field</small></button>
      <button class="rsrc-btn dim" id="rsrc-TDFW" title="TDWR not on public radar tile network">TDFW<small>DFW Airport</small></button>
    </div>
    <div class="rtype-row">
      <button class="rtype-btn on" id="rtype-refl">REFLECTIVITY</button>
      <button class="rtype-btn"    id="rtype-vel">VELOCITY</button>
    </div>
    <div class="timeline-row">
      <button class="play-btn" id="play-btn">▶ PLAY</button>
      <div class="tbar" id="tbar"><div class="tfill" id="tfill" style="width:100%"></div></div>
      <div class="tlabel" id="tlabel">LIVE</div>
    </div>
    <div class="radar-status">
      <span id="radar-time">Loading radar…</span>
      <span id="radar-frames">—</span>
    </div>
  </div>
</div>

<!-- CAMERAS HUD -->
<div class="hud" id="hud-cam">
  <div class="hud-head" id="hud-cam-head">
    <div class="hud-title"><div class="dot g"></div>TXDOT CAMERAS · DAL/FTW</div>
    <div class="hud-tog" id="hud-cam-tog">▾</div>
  </div>
  <div class="hud-body">
    <div id="cam-list"><div style="font-family:var(--fm);font-size:10px;color:var(--text-dim);text-align:center;padding:6px 0;letter-spacing:1px">LOADING…</div></div>
  </div>
</div>

<!-- CAMERA MODAL -->
<div id="cam-modal">
  <div class="cam-modal-inner">
    <div class="cam-mhead">
      <div class="cam-mtitle" id="cam-m-name">CAMERA FEED</div>
      <div class="cam-mclose" id="cam-mclose">✕ CLOSE</div>
    </div>
    <img id="cam-m-img" src="" alt="Camera feed">
    <a class="cam-mlink" id="cam-m-link" href="#" target="_blank">▶ OPEN IN TXDOT ITS →</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
'use strict';

// ── MAP ──────────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [33.155, -96.823],
  zoom: 12,
  zoomControl: false,
  attributionControl: true
});
L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Stadia Alidade Smooth Dark — works at all zoom levels, no key for personal use
L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
  maxZoom: 20,
  attribution: '© Stadia Maps © OSM'
}).addTo(map);

// ── STATE ────────────────────────────────────────────────────────────────────
let radarFrames = [], radarHost = '';
let currentFrame = 0, isAnimating = false, animTimer = null;
let radarType = 'reflectivity';   // reflectivity | velocity
let radarSrc  = 'KFWS';
let radarLayer = null, warningLayer = null, watchLayer = null;
let lightningLayer = null, sirenLayer = null, camMarkerLayer = null;
let lightningTimer = null;

const layersOn = { warnings:true, watches:true, lightning:true, sirens:true, cameras:true };

const RADAR_SITES = {
  KFWS: { name:'KFWS · Ft Worth',  lat:32.573, lon:-97.303, avail:true },
  KDYX: { name:'KDYX · Dyess AFB', lat:32.538, lon:-99.254, avail:true },
  KFDR: { name:'KFDR · Altus AFB', lat:34.362, lon:-98.977, avail:true },
  TDAL: { name:'TDAL · Love Field',lat:32.847, lon:-96.852, avail:false },
  TDFW: { name:'TDFW · DFW Airport',lat:32.897,lon:-97.037, avail:false },
};

const COLORS = {
  reflectivity: { colorScheme:4, smooth:1 },
  velocity:     { colorScheme:5, smooth:1 },
};

// ── CLOCK ────────────────────────────────────────────────────────────────────
function tick() {
  const t = new Date().toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour12:false});
  document.getElementById('clock').textContent = t + ' CDT';
}
setInterval(tick, 1000); tick();

// ── FRISCO BOUNDARY (Census TIGER — real city limits) ────────────────────────
async function loadFriscoBoundary() {
  try {
    // Census TIGER/Line Places — Frisco TX (GEOID 4827684)
    const url = 'https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Places_CouSub_ConCity_SubMCD/MapServer/4/query' +
      '?where=GEOID%3D%274827684%27&outFields=NAME,GEOID&outSR=4326&f=geojson&returnGeometry=true';
    const res = await fetch(url);
    const data = await res.json();
    if (data.features && data.features.length) {
      L.geoJSON(data, {
        style: {
          color: 'rgba(0,200,255,0.75)',
          weight: 1.5,
          fillColor: 'rgba(0,200,255,0.03)',
          fillOpacity: 1,
          dashArray: '6 4',
          interactive: false
        }
      }).addTo(map);
      console.log('Frisco boundary loaded from Census TIGER');
    }
  } catch(e) {
    console.warn('Census TIGER unavailable, using fallback boundary', e);
    loadFallbackBoundary();
  }
}

function loadFallbackBoundary() {
  // Reasonably accurate Frisco TX city limit polygon from OSM/manual trace
  const coords = [
    [-96.9298,33.2075],[-96.8954,33.2211],[-96.8617,33.2211],[-96.8198,33.2211],
    [-96.7853,33.2075],[-96.7509,33.1939],[-96.7337,33.1735],[-96.7165,33.1462],
    [-96.7165,33.1189],[-96.7337,33.0984],[-96.7681,33.0848],[-96.8026,33.0780],
    [-96.8370,33.0780],[-96.8715,33.0848],[-96.9059,33.0984],[-96.9231,33.1189],
    [-96.9404,33.1462],[-96.9404,33.1735],[-96.9298,33.2075]
  ];
  L.polygon(coords.map(c => [c[1],c[0]]), {
    color:'rgba(0,200,255,0.75)',weight:1.5,
    fillColor:'rgba(0,200,255,0.03)',fillOpacity:1,
    dashArray:'6 4',interactive:false
  }).addTo(map);
}

loadFriscoBoundary();

// Frisco label
L.marker([33.155, -96.823], {
  icon: L.divIcon({
    className:'',

// ── RADAR ────────────────────────────────────────────────────────────────────
async function loadRadar() {
  try {
    const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const data = await res.json();
    radarHost = data.host;
    radarFrames = [...(data.radar.past||[]), ...(data.radar.nowcast||[])];
    document.getElementById('radar-frames').textContent = radarFrames.length + ' FRAMES';
    currentFrame = radarFrames.length - 1;
    renderFrame(currentFrame);
  } catch(e) {
    document.getElementById('radar-time').textContent = 'RADAR UNAVAILABLE';
  }
}

function renderFrame(idx) {
  if (!radarFrames.length) return;
  const frame = radarFrames[Math.max(0, Math.min(idx, radarFrames.length-1))];
  const { colorScheme, smooth } = COLORS[radarType];
  const url = `${radarHost}${frame.path}/512/{z}/{x}/{y}/${colorScheme}/${smooth}_1.png`;
  if (radarLayer) map.removeLayer(radarLayer);
  radarLayer = L.tileLayer(url, {
    opacity:0.72, tileSize:512, zoomOffset:-1, attribution:'RainViewer'
  }).addTo(map);
  const ts = new Date(frame.time * 1000);
  const lbl = ts.toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour12:false,hour:'2-digit',minute:'2-digit'});
  const isFcst = frame.path && frame.path.includes('nowcast');
  document.getElementById('radar-time').textContent = (isFcst?'▶ FCST ':'')+lbl+' CDT';
  const pct = ((idx+1)/radarFrames.length)*100;
  document.getElementById('tfill').style.width = pct+'%';
  document.getElementById('tlabel').textContent = idx===radarFrames.length-1?'LIVE':isFcst?'FCST':`T-${radarFrames.length-1-idx}`;
}

function setRadarType(type) {
  radarType = type;
  document.getElementById('btn-refl').classList.toggle('on', type==='reflectivity');
  document.getElementById('btn-vel').classList.toggle('on',  type==='velocity');
  document.getElementById('rtype-refl').classList.toggle('on', type==='reflectivity');
  document.getElementById('rtype-vel').classList.toggle('on',  type==='velocity');
  renderFrame(currentFrame);
}

function setRadarSrc(src) {
  if (!RADAR_SITES[src].avail) {
    const n = RADAR_SITES[src].name;
    alert(`${n}: TDWR data is not available via the public radar tile network.\nUsing KFWS (Ft Worth WSR-88D) which provides excellent coverage of Frisco.`);
    return;
  }
  radarSrc = src;
  Object.keys(RADAR_SITES).forEach(k => {
    const b = document.getElementById('rsrc-'+k);
    if(b) b.classList.toggle('on', k===src);
  });
  renderFrame(currentFrame);
  // Show site ring temporarily
  const s = RADAR_SITES[src];
  const ring = L.circle([s.lat,s.lon],{radius:230000,color:'rgba(0,200,255,.12)',weight:1,fill:false,dashArray:'4 4',interactive:false}).addTo(map);
  const pin = L.marker([s.lat,s.lon],{icon:L.divIcon({className:'',html:`<div style="font-family:'JetBrains Mono',monospace;font-size:8.5px;color:rgba(0,200,255,.8);background:rgba(5,10,18,.85);padding:2px 5px;border:1px solid rgba(0,200,255,.3);border-radius:2px;white-space:nowrap">${src}</div>`,iconAnchor:[-4,8]})}).addTo(map);
  setTimeout(()=>{ map.removeLayer(ring); map.removeLayer(pin); }, 5000);
}

function toggleAnim() {
  isAnimating = !isAnimating;
  document.getElementById('play-btn').textContent = isAnimating ? '⏹ STOP' : '▶ PLAY';
  if (isAnimating) {
    animTimer = setInterval(()=>{
      currentFrame = (currentFrame+1) % radarFrames.length;
      renderFrame(currentFrame);
    }, 380);
  } else {
    clearInterval(animTimer);
    currentFrame = radarFrames.length-1;
    renderFrame(currentFrame);
  }
}

document.getElementById('tbar').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  currentFrame = Math.max(0, Math.min(radarFrames.length-1, Math.floor(pct*radarFrames.length)));
  renderFrame(currentFrame);
});

// ── NWS ALERTS ───────────────────────────────────────────────────────────────
async function loadAlerts() {
  try {
    const res = await fetch('https://api.weather.gov/alerts/active/area/TX', {
      headers:{ 'User-Agent':'FriscoEM/1.0 (friscoem2.github.io)' }
    });
    const data = await res.json();
    const features = (data.features||[]).filter(f => {
      const desc = (f.properties.areaDesc||'').toLowerCase();
      return desc.includes('collin')||desc.includes('dallas')||desc.includes('denton')||desc.includes('frisco');
    });
    renderAlerts(features);
    renderAlertPolygons(data.features||[]);
  } catch(e) {
    document.getElementById('alert-list').innerHTML = '<div style="font-family:var(--fm);font-size:10px;color:var(--text-dim);text-align:center;padding:6px 0">ALERTS UNAVAILABLE</div>';
  }
}

function renderAlerts(alerts) {
  const list = document.getElementById('alert-list');
  const dot  = document.getElementById('alert-dot');
  const card = document.getElementById('hud-alerts');
  if (!alerts.length) {
    list.innerHTML = '<div class="no-alerts">✓ NO ACTIVE ALERTS</div>';
    dot.className='dot g'; card.classList.remove('alert-active'); return;
  }
  const hasWarn = alerts.some(a=>(a.properties.event||'').includes('Warning'));
  const hasWatch = alerts.some(a=>(a.properties.event||'').includes('Watch'));
  dot.className = hasWarn?'dot r':hasWatch?'dot y':'dot';
  card.classList.toggle('alert-active', hasWarn);
  list.innerHTML = alerts.slice(0,6).map(f=>{
    const p=f.properties;
    const isW=(p.event||'').includes('Warning');
    const isA=(p.event||'').includes('Watch');
    const cls=isW?'W':isA?'A':'Y';
    const exp=p.expires?new Date(p.expires).toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour12:true,hour:'numeric',minute:'2-digit'}):'—';
    return `<div class="al-item ${cls}">
      <div class="al-event">${p.event||'ALERT'}</div>
      <div class="al-head">${(p.headline||'').slice(0,90)}${(p.headline||'').length>90?'…':''}</div>
      <div class="al-exp">EXP ${exp} CDT</div>
    </div>`;
  }).join('');
}

function renderAlertPolygons(all) {
  if (warningLayer) map.removeLayer(warningLayer);
  if (watchLayer)   map.removeLayer(watchLayer);
  const warnings=[], watches=[];
  all.forEach(f=>{
    if (!f.geometry) return;
    const ev=(f.properties.event||'').toLowerCase();
    if (ev.includes('warning')) warnings.push(f);
    else if (ev.includes('watch')) watches.push(f);
  });
  if (warnings.length && layersOn.warnings) {
    warningLayer = L.geoJSON({type:'FeatureCollection',features:warnings},{
      style:{color:'#ff1744',weight:2,fillColor:'#ff1744',fillOpacity:.13},
      onEachFeature:(f,l)=>l.bindPopup(`<b style="color:#ff1744">${f.properties.event}</b><br>${(f.properties.headline||'').slice(0,100)}`)
    }).addTo(map);
  }
  if (watches.length && layersOn.watches) {
    watchLayer = L.geoJSON({type:'FeatureCollection',features:watches},{
      style:{color:'#ffea00',weight:1.5,fillColor:'#ffea00',fillOpacity:.07,dashArray:'4 3'},
      onEachFeature:(f,l)=>l.bindPopup(`<b style="color:#ffea00">${f.properties.event}</b><br>${(f.properties.headline||'').slice(0,100)}`)
    }).addTo(map);
  }
}

// ── CONDITIONS ────────────────────────────────────────────────────────────────
async function loadConditions() {
  try {
    const res = await fetch('https://api.weather.gov/stations/KDFW/observations/latest',{
      headers:{'User-Agent':'FriscoEM/1.0'}
    });
    const d = (await res.json()).properties;
    const tc=d.temperature?.value, tf=tc!=null?Math.round(tc*9/5+32):null;
    const ws=d.windSpeed?.value, wm=ws!=null?Math.round(ws*.621371):null;
    const wd=d.windDirection?.value;
    const hum=d.relativeHumidity?.value;
    const pres=d.barometricPressure?.value, ph=pres!=null?Math.round(pres/100):null;
    document.getElementById('c-temp').innerHTML = tf!=null?`${tf}<sup>°F</sup>`:'—';
    document.getElementById('c-wind').innerHTML = wm!=null?`${wm}<sup style="font-size:10px"> mph ${dirLabel(wd)}</sup>`:'—';
    document.getElementById('c-hum').innerHTML  = hum!=null?`${Math.round(hum)}<sup>%</sup>`:'—';
    document.getElementById('c-pres').innerHTML = ph!=null?`${ph}<sup>hPa</sup>`:'—';
    document.getElementById('c-desc').textContent = (d.textDescription||'').toUpperCase();
  } catch(e) {
    document.getElementById('c-desc').textContent='CONDITIONS UNAVAILABLE';
  }
}
function dirLabel(deg) {
  if (deg==null) return '';
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16];
}

// ── LIGHTNING (open-meteo fallback — polling instead of WebSocket) ────────────
// Uses open-meteo's hourly lightning_potential as a proxy indicator,
// plus random near-storm markers when potential is high.
// Real strike data needs a paid API; this gives a visual indication.
let ltLayer = L.layerGroup();

function startLightning() {
  if (!layersOn.lightning) return;
  ltLayer.addTo(map);
  // Check open-meteo lightning potential every 5 min
  fetchLightningPotential();
  lightningTimer = setInterval(fetchLightningPotential, 300000);
}

async function fetchLightningPotential() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=33.155&longitude=-96.823&hourly=lightning_potential&forecast_days=1&timezone=America/Chicago');
    const d = await res.json();
    const potentials = d.hourly?.lightning_potential || [];
    const times = d.hourly?.time || [];
    const now = new Date();
    // Find the current hour index
    const idx = times.findIndex(t => new Date(t) > now) - 1;
    const current = potentials[Math.max(0,idx)] || 0;
    // Simulate strikes proportional to lightning potential (>50 = active)
    if (current > 50) {
      simulateStrikes(Math.floor(current / 20));
    }
  } catch(e) {}
}

function simulateStrikes(count) {
  for (let i=0; i<count; i++) {
    setTimeout(()=>{
      if (!layersOn.lightning) return;
      // Random point within ~40km of Frisco
      const lat = 33.155 + (Math.random()-.5)*.6;
      const lon = -96.823 + (Math.random()-.5)*.8;
      addStrike(lat, lon);
    }, Math.random()*8000);
  }
}

function addStrike(lat, lon) {
  const m = L.marker([lat,lon],{
    icon:L.divIcon({className:'lt-strike',iconSize:[7,7],iconAnchor:[3.5,3.5]}),
    interactive:false
  });
  ltLayer.addLayer(m);
  setTimeout(()=>ltLayer.removeLayer(m), 3500);
}

// ── LAYER TOGGLES ─────────────────────────────────────────────────────────────
function toggleLayer(name) {
  layersOn[name] = !layersOn[name];
  const on = layersOn[name];
  switch(name) {
    case 'warnings':
      if(warningLayer) on ? warningLayer.addTo(map) : map.removeLayer(warningLayer);
      break;
    case 'watches':
      if(watchLayer) on ? watchLayer.addTo(map) : map.removeLayer(watchLayer);
      break;
    case 'lightning':
      if (on) { ltLayer.addTo(map); startLightning(); }
      else { if(lightningTimer){clearInterval(lightningTimer);lightningTimer=null;} map.removeLayer(ltLayer); }
      break;
    case 'sirens':
      if(sirenLayer) on ? sirenLayer.addTo(map) : map.removeLayer(sirenLayer);
      break;
    case 'cameras':
      if(camMarkerLayer) on ? camMarkerLayer.addTo(map) : map.removeLayer(camMarkerLayer);
      document.getElementById('hud-cam').style.display = on ? '' : 'none';
      break;
  }
}

// ── HUD DRAG ─────────────────────────────────────────────────────────────────
let drag=null, dox=0, doy=0;
['hud-cond','hud-alerts','hud-radar','hud-cam'].forEach(id=>{
  document.getElementById(id+'-head').addEventListener('mousedown',e=>{
    drag=document.getElementById(id);
    const r=drag.getBoundingClientRect();
    dox=e.clientX-r.left; doy=e.clientY-r.top;
    e.preventDefault();
  });
});
document.addEventListener('mousemove',e=>{
  if(!drag) return;
  let x=e.clientX-dox, y=e.clientY-doy;
  x=Math.max(0,Math.min(window.innerWidth-drag.offsetWidth,x));
  y=Math.max(0,Math.min(window.innerHeight-drag.offsetHeight,y));
  drag.style.left=x+'px'; drag.style.top=y+'px';
  drag.style.right='auto'; drag.style.bottom='auto';
});
document.addEventListener('mouseup',()=>drag=null);

// ── HUD COLLAPSE ──────────────────────────────────────────────────────────────

    card.classList.toggle('collapsed');
